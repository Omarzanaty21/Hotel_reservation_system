server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy all /api requests to the ASP.NET Core container
    location /api/ {
        proxy_pass         http://hotel-api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for file uploads
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        client_max_body_size 10m;
    }

    # Reverse-proxy static room images served by the API
    location /images/ {
        proxy_pass       http://hotel-api:8080/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Angular SPA — serve index.html for any unmatched route
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
}
