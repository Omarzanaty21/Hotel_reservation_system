<section class="reservation-form-wrapper">
  <h2 class="reservation-form-wrapper__title">Sign In</h2>

  @if (error) {
    <p class="form-api-error" role="alert">{{ error.message }}</p>
  }

  <form
    class="reservation-form"
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    novalidate
  >

    <!-- Username -->
    <div class="form-field">
      <label class="form-field__label" for="userName">Username</label>
      <input
        id="userName"
        class="form-field__input"
        [class.form-field__input--error]="userName.invalid && userName.touched"
        type="text"
        formControlName="userName"
        autocomplete="username"
        aria-describedby="userName-error"
      />
      @if (userName.touched && userName.errors) {
        <p id="userName-error" class="form-field__error" role="alert">
          @if (userName.errors['required']) {
            Username is required.
          }
        </p>
      }
    </div>

    <!-- Password -->
    <div class="form-field">
      <label class="form-field__label" for="password">Password</label>
      <input
        id="password"
        class="form-field__input"
        [class.form-field__input--error]="password.invalid && password.touched"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        aria-describedby="password-error"
      />
      @if (password.touched && password.errors) {
        <p id="password-error" class="form-field__error" role="alert">
          @if (password.errors['required']) {
            Password is required.
          }
        </p>
      }
    </div>

    <button
      class="reservation-form__submit"
      type="submit"
      [disabled]="form.invalid || submitting"
    >
      {{ submitting ? 'Signing in…' : 'Sign In' }}
    </button>

  </form>
</section>
